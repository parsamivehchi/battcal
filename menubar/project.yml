name: BattCalBar
options:
  bundleIdPrefix: com.parsa
  deploymentTarget:
    macOS: "14.0"
targets:
  BattCalBar:
    type: application
    platform: macOS
    sources: [BattCalBar]
    dependencies:
      - sdk: CoreWLAN.framework
      - sdk: CoreLocation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parsa.battcalbar
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "6"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "BattCal reads your current Wi-Fi network name so it can cycle the battery only on your home networks, never in public."
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT - Parsa Mivehchi"
        SWIFT_VERSION: "5.10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
